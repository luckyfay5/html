              { title: "排列组合的概念", children: [{ title: "组合", children: [{ title: "从 n 个不同元素中任取 m 个元素并成一组，叫做从 n 个不同元素中取出 m 个元素的一个组合" }, { title: "从 n 个不同元素中取出 m 个元素的所有组合的个数，叫做从 n 个不同元素中取出 m 个元素的组合数，用符号表示：" }] }, { title: "排列", children: [{ title: "从 n 个不同元素中任取 m 个不同元素，按照一定的【顺序】排成一列，叫做从 n 个不同元素中取出 m 个元素的一个排列" }, { title: "从 n 个不同元素中取出 m 个元素的所有排列的个数，叫做从 n 个不同元素中取出 m 个元素的排列数..." }] }, { title: "英文中论述与描述", children: [{ title: "The combination is defined as “ An arrangement of obiects where the order..." }, { title: "Basically Permutation is an arrangement of objects in a particular way or order..." }] }, { title: "不一样的计数逻辑", children: [{ title: "比如，数有多少个苹果的时候，往往都会用1、2、3、4、5来数..." }, { title: "生活中还有这样的一种计数逻辑，在【描述一些可能性有多少】的时候，我们会发现不能用过去的1、2、3、4、5来计数..." }] }, { title: "学习计算可能性的方法是为学习概率统计理论做铺垫" }] },
              { title: "概率", children: [{ title: "数据概念", children: [{ title: "在一定条件下重复做 n 次实验， nA 为 n 次实验当中事件 A 发生的次数..." }] }, { title: "理论概念", children: [{ title: "设欧米伽是随机实验的样本空间，如果对欧米伽中任意事件 A 都对应一个实数 P（A）..." }] }, { title: "通俗理解", children: [{ title: "概率是你关注的可能性事件发生的集合的容量与所有的事件发生的总集和容量之间的比例，是一个子集与全集的比例关系...", children: [{ title: "随机事件指的是可能出现也可能不出现的事件。 如扔一个硬币，可能出现正面也可能出现反面。" }] }] }, { title: "概率概念是统计学的基石性的概念", children: [{ title: "任何一门学科，它的基石性的概念都极为重要，学不好的话，这门学科是不可能入门的。" }, { title: "在小学阶段的时候，它是以非常感性的例子，就如抛硬币抛来抛去的..." }, { title: "到了大学阶段，相同的逻辑会再次出现，它是以现代数学体系当中，将小学的感性的那些例子进行了理论化、抽象化。" }] }, { title: "概率是一种对自然和社会现象的逻辑认知", children: [{ title: "概率理论作为数学逻辑当中的重要组成模块，是人类对自然界逻辑认知的重要成果" }, { title: "接触和理解了【事件发生可能性】概念会帮助我们理解和正确认知自然", children: [{ title: "在这个世界上，一个基本的逻辑和一个基本的认知就是任何事件的发生都是以一定的可能性存在着" }, { title: "要理解事件的可能性发生到底是什么含义" }] }] }] },
              { title: "排列组合与概率之间的关系", children: [{ title: "在【数据概念】下，排列组合这种技术方法是在计算 nA 和 n 的数值到底是多少，有了 nA 和 n 的话，我们就可以通过 nA 比上 n 来求取概率，来计算概率。" }, { title: "在【理论概念】下，没有关系。" }, { title: "在【通俗理解】下，排列组合是用来计算你关注的可能性事件发生集合的容量，和计算所有事件发生的总集合容量的计数方法。（目标可能性与所有可能性）" }] }
            ]
          },
          {
            id: "t_5_2", title: "事件发生的独立性与依赖性", count: 12,
            children: [
              { title: "事件发生的独立性", children: [{ title: "两个层级理解", children: [{ title: "涵义理解（形象理解）：两个事件之间的独立性，是指一个事件的发生不影响另一个事件的发生，这就是事件发生的独立性。" }, { title: "集合论语言的理解（抽象理解）：若对于样本空间欧米伽中的事件 A、B 有 P（AB）=P（A）P（B） （probability of A and B 等于probability of A 乘以一个probability of B），则事件A、B是独立的。" }] }] },
              { title: "条件概率", children: [{ title: "两个层级理解", children: [{ title: "涵义理解（形象理解）：指事件A在另外一个事件B已经发生条件下的发生概率。" }, { title: "集合论语言的理解（抽象理解）：对于样本空间欧米伽中的事件 A、B ，probability of A ＞0的，则P（B|A）=P（AB）/P（A）。 这样的一个代数表达式勾画出了叫做事件 A 发生条件下事件 B 发生的概率，我们又称之为条件概率。" }] }, { title: "条件概率是我们每个人都无法回避的真实世界的数理逻辑", children: [{ title: "数学描述的是逻辑，是思维" }, { title: "概率描述是数学逻辑当中的一种" }, { title: "条件概率描述的就是人们生活中思考的各种各样问题时，很自然很自然的一种思维逻辑决策过程" }] }] }
            ]
          }
        ]
      }
    ];

    // --- 动态交互组件 (Widgets) ---

    const OddEvenWidget = () => {
      const [n, setN] = useState(1);
      return (
        <div className="mt-3 mb-5 p-4 sm:p-5 bg-[#1a202c] border border-gray-700 rounded-xl shadow-inner">
          <h4 className="text-[#e86855] font-bold text-xs uppercase tracking-widest mb-4">代数抽象：奇偶数感沙盘</h4>
          <div className="mb-5 text-sm text-gray-300">
            <label className="block mb-3">拖拽定义任意整数 n: <span className="font-mono text-[#e8e6e0] ml-2 text-lg">{n}</span></label>
            <input type="range" min="-10" max="10" value={n} onChange={(e) => setN(Number(e.target.value))} className="w-full accent-[#e86855]" />
          </div>
          <div className="flex flex-col sm:flex-row gap-4">
            <div className="flex-1 p-4 bg-[#0d1117] border border-gray-800 rounded-lg text-center shadow-sm">
              <div className="text-xs text-gray-500 mb-2">偶数 (2n)</div>
              <div className="text-xl sm:text-2xl font-mono text-[#e8e6e0]">2×({n}) = <span className="font-bold text-[#e86855]">{2 * n}</span></div>
            </div>
            <div className="flex-1 p-4 bg-[#0d1117] border border-gray-800 rounded-lg text-center shadow-sm">
              <div className="text-xs text-gray-500 mb-2">奇数 (2n+1)</div>
              <div className="text-xl sm:text-2xl font-mono text-[#e8e6e0]">2×({n})+1 = <span className="font-bold text-[#e86855]">{2 * n + 1}</span></div>
            </div>
          </div>
        </div>
      );
    };

    const SequenceFunctionWidget = () => {
      const [isContinuous, setIsContinuous] = useState(false);
      const [d, setD] = useState(2);
      const [a1, setA1] = useState(1);
      const points = useMemo(() => Array.from({length: 8}, (_, i) => ({ n: i + 1, y: a1 + i * d })), [a1, d]);
      const maxY = Math.max(...points.map(p => p.y), 20);
      
      return (
        <div className="mt-3 mb-5 p-4 sm:p-5 bg-[#1a202c] border border-gray-700 rounded-xl shadow-inner">
          <div className="flex flex-col sm:flex-row sm:justify-between items-start sm:items-center gap-3 mb-5">
            <h4 className="text-[#52b87a] font-bold text-xs uppercase tracking-widest">沙盘：离散与连续</h4>
            <button onClick={() => setIsContinuous(!isContinuous)} className={`text-xs px-4 py-2 rounded-lg font-bold transition-colors w-full sm:w-auto ${isContinuous ? 'bg-[#52b87a] text-black shadow-md' : 'bg-gray-700 text-gray-300 hover:bg-gray-600'}`}>
              {isContinuous ? '退回离散数列' : '扩展为连续函数'}
            </button>
          </div>
          <div className="flex flex-col sm:flex-row gap-4 mb-5 text-sm text-gray-300">
            <div className="flex-1 flex flex-col gap-2">
              <label className="whitespace-nowrap">首项/截距: <span className="font-mono text-[#e8e6e0]">{a1}</span></label>
              <input type="range" min="0" max="10" value={a1} onChange={(e)=>setA1(Number(e.target.value))} className="w-full accent-[#52b87a]" />
            </div>
            <div className="flex-1 flex flex-col gap-2">
              <label className="whitespace-nowrap">公差/斜率: <span className="font-mono text-[#e8e6e0]">{d}</span></label>
              <input type="range" min="1" max="5" value={d} onChange={(e)=>setD(Number(e.target.value))} className="w-full accent-[#52b87a]" />
            </div>
          </div>
          <div className="relative h-48 w-full bg-[#0d1117] rounded-lg overflow-hidden border border-gray-800 shadow-sm">
            <svg viewBox="0 0 400 160" className="w-full h-full" preserveAspectRatio="none">
              <line x1="20" y1="140" x2="380" y2="140" stroke="#374151" strokeWidth="2" />
              <line x1="20" y1="20" x2="20" y2="140" stroke="#374151" strokeWidth="2" />
              
              {isContinuous && (
                <line 
                  x1={20} y1={140 - (a1 * 120 / maxY)} 
                  x2={20 + 7 * 40} y2={140 - ((a1 + 7 * d) * 120 / maxY)} 
                  stroke="#52b87a" strokeWidth="3" strokeDasharray="6 6" className="animate-pulse" 
                />
              )}
              
              {points.map((p, i) => (
                <circle 
                  key={i} 
                  cx={20 + (p.n - 1) * 40} 
                  cy={140 - (p.y * 120 / maxY)} 
                  r="5" fill={isContinuous ? "#52b87a" : "#60a5fa"} 
                />
              ))}
            </svg>
          </div>
          <div className="mt-4 p-3 bg-[#0d1117] rounded border border-gray-800 text-sm text-center font-mono text-[#e8e6e0]">
            {isContinuous ? `y = ${d}x + ${a1 - d}` : `aₙ = ${a1} + (n-1)×${d}`}
          </div>
        </div>
      );
    };

    const SetTheoryWidget = () => {
      const [op, setOp] = useState('none');

      return (
        <div className="mt-3 mb-5 p-4 sm:p-5 bg-[#1a202c] border border-gray-700 rounded-xl shadow-inner">
          <h4 className="text-[#5c90e8] font-bold text-xs uppercase tracking-widest mb-5 text-center">沙盘：韦恩图实例化</h4>
          <div className="flex flex-wrap gap-2 justify-center mb-6">
            {[{id: 'none', label: '原集'}, {id: 'union', label: 'A ∪ B'}, {id: 'intersect', label: 'A ∩ B'}, {id: 'diffA', label: 'A - B'}].map(btn => (
              <button key={btn.id} onClick={() => setOp(btn.id)} className={`px-4 py-2 text-xs sm:text-sm font-bold rounded-lg border transition-all ${op === btn.id ? 'bg-[#5c90e8] text-white border-[#5c90e8] shadow-md' : 'border-gray-600 text-gray-400 hover:text-white hover:bg-gray-800'}`}>
                {btn.label}
              </button>
            ))}
          </div>
          <div className="flex justify-center items-center h-40 sm:h-48">
            <svg viewBox="0 0 300 120" className="h-full w-full max-w-[400px]">
              <defs>
                <clipPath id="clipB"><circle cx="180" cy="60" r="45" /></clipPath>
                <mask id="maskDiffA">
                  <rect x="0" y="0" width="100%" height="100%" fill="white" />
                  <circle cx="180" cy="60" r="45" fill="black" />
                </mask>
              </defs>
              
              <circle cx="120" cy="60" r="45" fill="none" stroke="#5c90e8" strokeWidth="2" />
              <circle cx="180" cy="60" r="45" fill="none" stroke="#5c90e8" strokeWidth="2" />

              {op === 'union' && (
                <g className="animate-fade-in">
                  <circle cx="120" cy="60" r="45" fill="rgba(92, 144, 232, 0.4)" />
                  <circle cx="180" cy="60" r="45" fill="rgba(92, 144, 232, 0.4)" />
                </g>
              )}
              {op === 'intersect' && (
                <circle className="animate-fade-in" cx="120" cy="60" r="45" fill="rgba(92, 144, 232, 0.8)" clipPath="url(#clipB)" />
              )}
              {op === 'diffA' && (
                <circle className="animate-fade-in" cx="120" cy="60" r="45" fill="rgba(92, 144, 232, 0.6)" mask="url(#maskDiffA)" />
              )}

              <text x="95" y="65" fill="#fff" fontSize="16" fontWeight="bold">A</text>
              <text x="195" y="65" fill="#fff" fontSize="16" fontWeight="bold">B</text>
            </svg>
          </div>
        </div>
      );
    };

    // --- 递归树渲染组件 ---
    const TreeNode = ({ node, level = 0 }) => {
      const [isExpanded, setIsExpanded] = useState(true);
      const hasChildren = node.children && node.children.length > 0;

      return (
        <div className={`relative ${level > 0 ? 'ml-3 sm:ml-5 pl-3 sm:pl-4 border-l border-gray-800' : ''}`}>
          {level > 0 && <div className="absolute left-0 top-3 w-2 sm:w-3 border-t border-gray-800"></div>}
          
          <div className="flex items-start py-2 group">
            {hasChildren ? (
              <button onClick={() => setIsExpanded(!isExpanded)} className="mt-1 mr-2 sm:mr-3 flex-shrink-0 text-gray-500 hover:text-gray-300 p-1">
                <svg className={`w-4 h-4 transition-transform ${isExpanded ? 'rotate-90' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7" />
                </svg>
              </button>
            ) : (
              <div className="w-6 sm:w-7 flex-shrink-0"></div>
            )}
            
            <div className="flex-1 w-full overflow-hidden">
              <p className={`text-[14px] sm:text-[15px] leading-relaxed break-words ${level === 0 ? 'text-gray-200 font-medium' : 'text-gray-400'}`}>
                {node.title}
              </p>
              
              {node.widget === 'OddEven' && <OddEvenWidget />}
              {node.widget === 'SequenceFunction' && <SequenceFunctionWidget />}
              {node.widget === 'SetTheory' && <SetTheoryWidget />}
            </div>
          </div>

          {hasChildren && isExpanded && (
            <div className="mt-1">
              {node.children.map((child, idx) => (
                <TreeNode key={idx} node={child} level={level + 1} />
              ))}
            </div>
          )}
        </div>
      );
    };

    // --- 主框架应用 ---
    function App() {
      const [activeTab, setActiveTab] = useState("module_0");
      const [expandedTopics, setExpandedTopics] = useState({});

      const toggleTopic = (id) => {
        setExpandedTopics(prev => ({...prev, [id]: !prev[id]}));
      };

      const currentModule = xmindData.find(m => m.id === activeTab);

      return (
        <div className="min-h-screen flex flex-col w-full">
          <header className="pt-10 sm:pt-14 pb-8 sm:pb-10 px-4 text-center border-b border-gray-800 bg-gradient-to-b from-[#161b22] to-[#0d1117]">
            <div className="text-xs sm:text-sm tracking-widest text-gray-500 mb-3 sm:mb-4 uppercase">MMAcademy · 吴江</div>
            <h1 className="text-2xl sm:text-3xl md:text-4xl font-serif font-bold text-white mb-3 sm:mb-5 leading-snug">
              AMC8体系：<span className="bg-clip-text text-transparent bg-gradient-to-r from-yellow-500 to-orange-400">问题解决的艺术</span>
            </h1>
            <div className="mt-4 sm:mt-6 flex flex-col sm:flex-row justify-center items-center gap-2 sm:gap-4 text-xs sm:text-sm text-gray-400">
              <span>数理逻辑篇</span>
              <span className="hidden sm:inline text-gray-700">|</span>
              <span>导图构建：37</span>
            </div>
          </header>

          {/* 顶部标签栏 - 修正响应式与横向滚动 */}
          <div className="sticky top-0 z-50 flex w-full overflow-x-auto bg-[#161b22] border-b border-gray-800 scrollbar-hide shadow-lg md:justify-center justify-start px-2 sm:px-4">
            {xmindData.map((mod) => (
              <button
                key={mod.id}
                onClick={() => {
                  setActiveTab(mod.id);
                  if (mod.topics.length > 0 && !expandedTopics[mod.topics[0].id]) {
                    setExpandedTopics(prev => ({...prev, [mod.topics[0].id]: true}));
                  }
                }}
                className={`flex items-center gap-2 px-4 sm:px-6 py-4 text-sm whitespace-nowrap border-b-[3px] transition-all flex-shrink-0 ${
                  activeTab === mod.id ? 'text-white bg-[#1c2128] font-bold' : 'text-gray-500 border-transparent hover:text-gray-300 hover:bg-[#1a1f26]'
                }`}
                style={{ borderBottomColor: activeTab === mod.id ? mod.color : 'transparent' }}
              >
                <span style={{ color: activeTab === mod.id ? mod.color : 'inherit', opacity: activeTab === mod.id ? 1 : 0.5 }} className="font-serif text-base">
                  {mod.badge}
                </span>
                {mod.title}
              </button>
            ))}
          </div>

          {/* 主内容区 */}
          <main className="max-w-4xl mx-auto p-3 sm:p-6 pb-24 flex-1 w-full">
            {currentModule && (
              <div className="animate-fade-in w-full">
                <div className="flex items-center gap-3 sm:gap-4 mb-4 sm:mb-6 pb-4 border-b border-gray-800">
                  <div className="w-10 h-10 sm:w-12 sm:h-12 rounded-xl flex items-center justify-center font-serif text-lg sm:text-xl font-bold flex-shrink-0" style={{ backgroundColor: `${currentModule.color}20`, color: currentModule.color }}>
                    {currentModule.badge}
                  </div>
                  <h2 className="text-xl sm:text-2xl font-serif font-bold text-gray-100">{currentModule.title}</h2>
                </div>
                
                {/* 模块导读小字区块 */}
                {currentModule.desc && (
                  <div className="mb-6 sm:mb-8 p-4 sm:p-5 bg-[#161b22] border-l-4 rounded-r-xl text-sm sm:text-base text-gray-300 leading-relaxed shadow-sm" style={{ borderLeftColor: currentModule.color }}>
                    {currentModule.desc}
                  </div>
                )}

                <div className="space-y-4 sm:space-y-5">
                  {currentModule.topics.map(topic => (
                    <div key={topic.id} className="bg-[#161b22] border border-gray-800 rounded-xl overflow-hidden shadow-sm">
                      <button 
                        onClick={() => toggleTopic(topic.id)}
                        className="w-full flex items-center justify-between p-4 sm:p-5 hover:bg-[#1c2128] transition-colors"
                      >
                        <div className="flex items-center gap-3 flex-1 overflow-hidden pr-2">
                          <div className="w-2 h-2 sm:w-2.5 sm:h-2.5 rounded-full flex-shrink-0" style={{ backgroundColor: currentModule.color }}></div>
                          <span className="font-medium text-[15px] sm:text-[16px] text-gray-100 text-left truncate">{topic.title}</span>
                        </div>
                        <div className="flex items-center gap-2 sm:gap-4 text-gray-500 flex-shrink-0">
                          <span className="hidden sm:inline text-xs font-mono bg-[#0d1117] px-2 py-1 rounded-md border border-gray-800">{topic.count} Nodes</span>
                          <svg className={`w-5 h-5 transition-transform duration-300 ${expandedTopics[topic.id] ? 'rotate-90 text-gray-300' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7" />
                          </svg>
                        </div>
                      </button>

                      {expandedTopics[topic.id] && (
                        <div className="p-3 sm:p-5 border-t border-gray-800 bg-[#0d1117] overflow-hidden w-full">
                          {topic.children && topic.children.length > 0 ? (
                            <div className="space-y-1 sm:space-y-2">
                              {topic.children.map((childNode, index) => (
                                <TreeNode key={index} node={childNode} level={0} />
                              ))}
                            </div>
                          ) : (
                            <p className="text-gray-600 text-sm italic">无下级节点</p>
                          )}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            )}
          </main>

          {/* 页脚版权信息 */}
          <footer className="py-10 px-4 text-center border-t border-gray-800 bg-[#0a0d13]">
            <p className="text-xs text-gray-600 font-mono">
              © {new Date().getFullYear()} AMC8 数理逻辑交互图谱
            </p>
          </footer>
        </div>
      );
    }

    // --- 启动应用 ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
